    <script>
        class Node {
            constructor(data) {
                this._data = data;
                this._next = null;
            }
            get data() { return this._data; }
            set data(value) { this._data = value; }
            get next() { return this._next; }
            set next(value) { this._next = value; }
        }

        class LinkedList {
            constructor() {
                this._head = null;
            }
            insert_or_update(item, key_field) {
                if (!this._head) {
                    this._head = new Node(item);
                    return;
                }
                let current_node = this._head;
                while (current_node) {
                    if (current_node.data[key_field] === item[key_field]) {
                        current_node.data = item;
                        return;
                    }
                    if (!current_node.next) {
                        current_node.next = new Node(item);
                        return;
                    }
                    current_node = current_node.next;
                }
            }
            to_array() {
                const elements_array = [];
                let current_node = this._head;
                while (current_node) {
                    elements_array.push(current_node.data);
                    current_node = current_node.next;
                }
                return elements_array;
            }
            find_by_key(value, key_field) {
                let current_node = this._head;
                while (current_node) {
                    if (current_node.data[key_field] === value) return current_node.data;
                    current_node = current_node.next;
                }
                return null;
            }
        }

        class GenericQueue {
            constructor() {
                this._front = null;
                this._rear = null;
            }
            enqueue(item) {
                const new_node = new Node(item);
                if (!this._rear) {
                    this._front = this._rear = new_node;
                    return;
                }
                this._rear.next = new_node;
                this._rear = new_node;
            }
            to_array() {
                const elements_array = [];
                let current_node = this._front;
                while (current_node) {
                    elements_array.unshift(current_node.data);
                    current_node = current_node.next;
                }
                return elements_array;
            }
        }

        class WatchProduct {
            constructor(model_name, stock_quantity, cost_price, sale_price, last_restock_date) {
                this.model_name = model_name.trim().toUpperCase();
                this.stock_quantity = Math.max(0, stock_quantity);
                this.cost_price = Math.max(0, cost_price);
                this.sale_price = Math.max(0, sale_price);
                this.last_restock_date = last_restock_date || new Date().toISOString();
            }
            to_plain_object() {
                return {
                    model_name: this.model_name,
                    stock_quantity: this.stock_quantity,
                    cost_price: this.cost_price,
                    sale_price: this.sale_price,
                    last_restock_date: this.last_restock_date
                };
            }
        }

        class ModelMetric {
            constructor(model_name) {
                this._model_name = model_name;
                this._total_sold_quantity = 0;
                this._total_profit_generated = 0;
                this._total_days_tracked = 0;
                this._sales_with_tracking = 0;
            }
            get model_name() { return this._model_name; }
            get total_sold_quantity() { return this._total_sold_quantity; }
            set total_sold_quantity(value) { this._total_sold_quantity = value; }
            get total_profit_generated() { return this._total_profit_generated; }
            set total_profit_generated(value) { this._total_profit_generated = value; }
            get total_days_tracked() { return this._total_days_tracked; }
            set total_days_tracked(value) { this._total_days_tracked = value; }
            get sales_with_tracking() { return this._sales_with_tracking; }
            set sales_with_tracking(value) { this._sales_with_tracking = value; }
        }

        class BusinessLogic {
            constructor() {
                this._inventory = new LinkedList();
                this._sales = new GenericQueue();
                this._expenses = new GenericQueue();
                this._initial_investment = 0;
            }
            get inventory() { return this._inventory; }
            get sales() { return this._sales; }
            get expenses() { return this._expenses; }
            get initial_investment() { return this._initial_investment; }
            set initial_investment(value) { this._initial_investment = value; }

            get_plain_data() {
                return {
                    inventory: this._inventory.to_array(),
                    sales: this._sales.to_array().reverse(),
                    expenses: this._expenses.to_array().reverse(),
                    initial_investment: this._initial_investment
                };
            }

            save_to_local() {
                const plain_data = this.get_plain_data();
                localStorage.setItem('watch_manager_data', JSON.stringify(plain_data));
                if(window.cloud_manager) window.cloud_manager.sync_up(plain_data);
            }

            load_from_local() {
                const stored_data_string = localStorage.getItem('watch_manager_data');
                if (stored_data_string) {
                    this.populate_from_plain_data(JSON.parse(stored_data_string));
                }
            }

            populate_from_plain_data(parsed_data) {
                let needs_sync = false;
                this._inventory = new LinkedList();
                this._sales = new GenericQueue();
                this._expenses = new GenericQueue();

                let genesis_timestamp = Date.now();
                if (parsed_data.sales && parsed_data.sales.length > 0) {
                    let min_time = Date.now();
                    for (let i = 0; i < parsed_data.sales.length; i++) {
                        const current_time = new Date(parsed_data.sales[i].timestamp).getTime();
                        if (current_time < min_time) {
                            min_time = current_time;
                        }
                    }
                    genesis_timestamp = min_time - (3 * 24 * 3600 * 1000);
                }

                if (parsed_data.inventory) {
                    parsed_data.inventory.forEach(item => {
                        if (item.cost_price === 0) { item.cost_price = 8; needs_sync = true; }
                        if (item.sale_price === 0) { item.sale_price = 15; needs_sync = true; }
                        if (!item.last_restock_date) { 
                            item.last_restock_date = new Date(genesis_timestamp).toISOString(); 
                            needs_sync = true; 
                        }
                        this._inventory.insert_or_update(item, 'model_name');
                    });
                }
                
                if (parsed_data.initial_investment === undefined || parsed_data.initial_investment === 0) {
                    this._initial_investment = 208;
                    needs_sync = true;
                } else {
                    this._initial_investment = parsed_data.initial_investment;
                }

                if (parsed_data.sales) {
                    parsed_data.sales.forEach(sale => {
                        if (sale.total_cost === undefined || sale.total_cost === 0) {
                            sale.total_cost = sale.quantity * 8;
                            sale.profit = sale.total_sale - sale.total_cost;
                            needs_sync = true;
                        }
                        if (sale.days_to_sell === undefined || sale.days_to_sell === null) {
                            const sale_time = new Date(sale.timestamp).getTime();
                            const days_diff = (sale_time - genesis_timestamp) / (1000 * 3600 * 24);
                            sale.days_to_sell = Math.max(1, days_diff);
                            needs_sync = true;
                        }
                        this._sales.enqueue(sale);
                    });
                }
                if (parsed_data.expenses) {
                    parsed_data.expenses.forEach(expense => this._expenses.enqueue(expense));
                }
                return needs_sync;
            }

            calculate_statistics() {
                const sales_array = this._sales.to_array();
                const expenses_array = this._expenses.to_array();
                
                const total_sales_amount = sales_array.reduce((acc, s) => acc + s.total_sale, 0);
                const total_capital_recovered = sales_array.reduce((acc, s) => acc + s.total_cost, 0);
                const total_gross_profit = sales_array.reduce((acc, s) => acc + s.profit, 0);
                
                const total_net_expenses = expenses_array.reduce((acc, e) => e.is_reintegro ? acc - e.amount : acc + e.amount, 0);
                
                return {
                    total_sales_amount,
                    total_capital_recovered,
                    total_gross_profit,
                    total_net_expenses,
                    pending_investment: Math.max(this._initial_investment - total_capital_recovered, 0),
                    net_balance: total_gross_profit - total_net_expenses,
                    progress_percentage: this._initial_investment > 0 ? Math.min((total_capital_recovered / this._initial_investment) * 100, 100) : 0
                };
            }

            get_raw_model_metrics() {
                const aggregated_metrics = new LinkedList();
                const sales_history = this._sales.to_array();
                
                for (let i = 0; i < sales_history.length; i++) {
                    const sale_record = sales_history[i];
                    let metric_data = aggregated_metrics.find_by_key(sale_record.model_name, 'model_name');
                    
                    if (!metric_data) {
                        metric_data = new ModelMetric(sale_record.model_name);
                    }
                    
                    metric_data.total_sold_quantity += sale_record.quantity;
                    metric_data.total_profit_generated += sale_record.profit;

                    if (sale_record.days_to_sell !== undefined && sale_record.days_to_sell !== null) {
                        metric_data.total_days_tracked += (sale_record.days_to_sell * sale_record.quantity);
                        metric_data.sales_with_tracking += sale_record.quantity;
                    }

                    aggregated_metrics.insert_or_update(metric_data, 'model_name');
                }
                return aggregated_metrics.to_array();
            }

            calculate_advanced_business_metrics() {
                const sales_array = this._sales.to_array();
                const inv_array = this._inventory.to_array();

                let total_sales_amount = 0;
                for (let i = 0; i < sales_array.length; i++) {
                    total_sales_amount += sales_array[i].total_sale;
                }
                const average_ticket = sales_array.length > 0 ? (total_sales_amount / sales_array.length) : 0;

                let locked_capital = 0;
                let highest_margin_model = "N/A";
                let highest_margin_value = 0;

                for (let j = 0; j < inv_array.length; j++) {
                    const item = inv_array[j];
                    locked_capital += (item.stock_quantity * item.cost_price);
                    
                    const margin = item.sale_price - item.cost_price;
                    if (margin > highest_margin_value) {
                        highest_margin_value = margin;
                        highest_margin_model = item.model_name;
                    }
                }

                return {
                    average_ticket,
                    locked_capital,
                    highest_margin_model,
                    highest_margin_value
                };
            }
        }

        class DashboardManager {
            constructor() {
                this._instances = {};
                Chart.defaults.font.family = "'Inter', sans-serif";
                Chart.defaults.color = '#64748b';
            }

            destroy_chart(chart_id) {
                if (this._instances[chart_id]) {
                    this._instances[chart_id].destroy();
                }
            }

            render_fastest_sellers_chart(canvas_id, models_data) {
                this.destroy_chart(canvas_id);
                const ctx = document.getElementById(canvas_id);
                if (!ctx) return;

                const valid_models = models_data.filter(m => m.sales_with_tracking > 0);
                valid_models.forEach(m => m.avg_days = m.total_days_tracked / m.sales_with_tracking);
                
                const filtered = valid_models.sort((a,b) => a.avg_days - b.avg_days).slice(0, 7);
                const labels = filtered.map(m => m.model_name);
                const data = filtered.map(m => m.avg_days);

                this._instances[canvas_id] = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [{ label: 'Días promedio en stock', data: data, backgroundColor: '#f59e0b', borderRadius: 6 }]
                    },
                    options: { 
                        indexAxis: 'y',
                        responsive: true, 
                        maintainAspectRatio: false, 
                        plugins: { legend: { display: false } },
                        scales: { 
                            x: { beginAtZero: true, grid: { borderDash: [4, 4] } }, 
                            y: { grid: { display: false }, ticks: { font: { size: 10, weight: 'bold' } } } 
                        }
                    }
                });
            }
        }

        class CloudSyncManager {
            constructor() {
                this.master_key = '$2a$10$sMoRA2lgCvXGcOF9Wra/w.yEs71AC9oegEb57cz6ucFSu1XJQVWQC';
                this.bin_id = '69c70966c3097a1dd569f0ba'; 
                this.update_status_indicator('idle');
            }

            update_status_indicator(status) {
                const indicator = document.getElementById('cloud_status');
                indicator.className = 'w-3 h-3 rounded-full transition-all';
                if (status === 'syncing') indicator.classList.add('bg-yellow-400', 'animate-pulse');
                else if (status === 'success') indicator.classList.add('bg-green-500');
                else if (status === 'error') indicator.classList.add('bg-red-500');
                else indicator.classList.add('bg-slate-300');
            }

            async sync_up(data, is_manual = false) {
                try {
                    this.update_status_indicator('syncing');
                    const response = await fetch(`https://api.jsonbin.io/v3/b/${this.bin_id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json', 'X-Master-Key': this.master_key },
                        body: JSON.stringify(data)
                    });
                    if (!response.ok) throw new Error("Sync failed");
                    this.update_status_indicator('success');
                    if (is_manual) window.ui_manager.show_notification("Trabajo sincronizado correctamente", "success");
                } catch (error) {
                    this.update_status_indicator('error');
                    if (is_manual) window.ui_manager.show_notification("Error de red: No se pudo guardar", "error");
                }
            }

            async sync_down() {
                try {
                    this.update_status_indicator('syncing');
                    const response = await fetch(`https://api.jsonbin.io/v3/b/${this.bin_id}/latest`, {
                        headers: { 'X-Master-Key': this.master_key }
                    });
                    const result = await response.json();
                    if (result.record) {
                        const needs_sync = window.app_core.populate_from_plain_data(result.record);
                        localStorage.setItem('watch_manager_data', JSON.stringify(result.record));
                        window.ui_manager.render_interface();
                        this.update_status_indicator('success');
                        if (needs_sync) window.app_core.save_to_local();
                    }
                } catch (error) {
                    this.update_status_indicator('error');
                    window.app_core.load_from_local();
                    window.ui_manager.render_interface();
                }
            }
        }

                setTimeout(() => {
                    el.classList.remove('translate-y-0', 'opacity-100');
                    el.classList.add('translate-y-32', 'opacity-0');

            edit_inventory_item(name) {

                this.switch_tab('inventory');
                this._is_editing_inventory = true;

            cancel_edit() {

                document.getElementById('btn_submit_inventory').innerText = "Guardar Modelo";
                document.getElementById('btn_cancel_edit').classList.add('hide');
            },

            handle_inventory_submit(e) {
                e.preventDefault();
                const fd = new FormData(e.target);
                const model_name = fd.get('model_name');
                const new_qty = parseInt(fd.get('stock_quantity'));
                const cost = parseFloat(fd.get('cost_price'));
                const sale = parseFloat(fd.get('sale_price'));

                let existing_prod = window.app_core.inventory.find_by_key(model_name.trim().toUpperCase(), 'model_name');
                let restock_date = new Date().toISOString();

                if (existing_prod && new_qty <= existing_prod.stock_quantity) {
                    restock_date = existing_prod.last_restock_date || restock_date;
                }

                const prod = new WatchProduct(model_name, new_qty, cost, sale, restock_date);
                window.app_core.inventory.insert_or_update(prod.to_plain_object(), 'model_name');
                window.app_core.save_to_local();
                this.show_notification("Inventario actualizado", "success");
                this.cancel_edit();
                this.render_interface();
            },

            handle_sale_submit(e) {
                e.preventDefault();
                const fd = new FormData(e.target);
                const model = fd.get('sale_model');
                const qty = parseInt(fd.get('sale_quantity'));
                const price = parseFloat(fd.get('sale_price'));
                const date = fd.get('transaction_date');

                const prod = window.app_core.inventory.find_by_key(model, 'model_name');
                if (!prod || prod.stock_quantity < qty) return this.show_notification("Stock insuficiente", "error");

                prod.stock_quantity -= qty;

                let days_to_sell = null;
                if (prod.last_restock_date) {
                    const t1 = new Date(prod.last_restock_date).getTime();
                    const t2 = new Date(date).getTime();
                    days_to_sell = Math.max(0, (t2 - t1) / (1000 * 3600 * 24));
                }

                const record = { id: Date.now(), timestamp: date, model_name: model, quantity: qty, total_sale: qty * price, total_cost: qty * prod.cost_price, profit: (qty * price) - (qty * prod.cost_price), days_to_sell: days_to_sell };
                window.app_core.sales.enqueue(record);
                window.app_core.save_to_local();
                this.show_notification("Venta procesada con éxito", "success");
                this.render_interface();
            },

            handle_expense_submit(e) {
                e.preventDefault();
                const fd = new FormData(e.target);
                const record = { id: Date.now(), timestamp: fd.get('transaction_date'), amount: parseFloat(fd.get('expense_amount')), description: fd.get('expense_description'), is_reintegro: false };
                window.app_core.expenses.enqueue(record);
                window.app_core.save_to_local();
                this.show_notification("Gasto registrado en la nube", "success");
                this.render_interface();
            },

            process_reintegro(id) {

                const record = { id: Date.now(), timestamp: this.get_now_string(), amount: exp.amount, description: `REINTEGRO: ${exp.description}`, is_reintegro: true };
                window.app_core.expenses.enqueue(record);
                window.app_core.save_to_local();
                this.show_notification("Dinero devuelto a caja", "success");

                    });

                } else if (this._current_active_tab === 'sales') {

                    sls.forEach(s => {
                        const d = new Date(s.timestamp);
                        const fmt = d.toLocaleString('es-ES', { day: '2-digit', month: '2-digit', hour: '2-digit', minute:'2-digit' });
                        html += `<tr><td class="px-5 py-4 text-[10px] font-bold text-slate-400 leading-none">${fmt}</td><td class="px-5 py-4 font-black text-xs uppercase leading-tight">${s.model_name} <span class="text-slate-400">x${s.quantity}</span></td><td class="px-5 py-4 font-mono text-xs font-bold">$${s.total_sale.toFixed(2)}</td><td class="px-5 py-4 text-right font-black text-green-600 font-mono text-sm">+$${s.profit.toFixed(2)}</td></tr>`;
                    });

                } else if (this._current_active_tab === 'expenses') {
                    const exps = window.app_core.expenses.to_array();
                    let html = `<table class="w-full text-left min-w-[450px]"><thead class="bg-slate-50 border-b border-slate-100 text-[10px] font-black text-slate-400 uppercase tracking-widest"><tr><th class="px-5 py-4">Fecha</th><th class="px-5 py-4">Motivo</th><th class="px-5 py-4">Monto</th><th class="px-5 py-4 text-right"></th></tr></thead><tbody class="divide-y divide-slate-100">`;
                    exps.forEach(e => {

                        html += `<tr class="${e.is_reintegro ? 'bg-green-50/40' : ''}"><td class="px-5 py-4 text-[10px] font-bold text-slate-400">${fmt}</td><td class="px-5 py-4 text-xs font-bold text-slate-700 leading-tight">${e.description}</td><td class="px-5 py-4 font-black font-mono text-sm ${e.is_reintegro ? 'text-green-600' : 'text-red-500'}">${e.is_reintegro ? '+' : '-'}$${e.amount.toFixed(2)}</td><td class="px-5 py-4 text-right">${!e.is_reintegro ? `<button onclick="window.ui_manager.process_reintegro(${e.id})" class="text-green-600 bg-green-50 p-2 rounded-xl font-bold text-[10px] uppercase flex items-center gap-1 ml-auto active:scale-95"><i data-lucide="undo-2" class="w-3 h-3"></i></button>` : ''}</td></tr>`;
                    });
                    container.innerHTML = html + `</tbody></table>`;
                }
                lucide.createIcons();
            }
        };

        window.onload = () => {
            window.cloud_manager.sync_down();
            lucide.createIcons();
        };
